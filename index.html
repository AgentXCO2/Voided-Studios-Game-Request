<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Voided Studios Game Requests</title>

<style>
body{
margin:0;
font-family:monospace;
background:#0b0b10;
color:white;
}

header{
padding:15px;
border-bottom:1px solid #222;
text-align:center;
}

.container{
display:grid;
grid-template-columns:1fr 340px;
height:calc(100vh - 60px);
}

.left{
padding:20px;
overflow-y:auto;
}

.card{
background:#111;
padding:15px;
border-radius:10px;
border:1px solid #222;
margin-bottom:10px;
}

input,select,textarea{
width:100%;
padding:10px;
margin:6px 0;
background:#050507;
border:1px solid #333;
color:white;
border-radius:6px;
font-family:monospace;
}

textarea{
height:140px;
resize:none;
}

button{
background:#7c3aed;
border:none;
padding:10px 14px;
border-radius:6px;
color:white;
cursor:pointer;
margin:5px 0;
}

button:hover{
background:#5b21b6;
}

.right{
border-left:1px solid #222;
padding:15px;
overflow-y:auto;
}

.app{
background:#0f0f14;
border:1px solid #222;
padding:10px;
border-radius:8px;
margin-bottom:10px;
}

.small{
font-size:12px;
color:#888;
}
</style>
</head>

<body>

<header>
<h2>Voided Studios Game Request Portal</h2>
</header>

<div class="container">

<!-- FORM -->
<div class="left">

<div class="card">
<h3>Submit Game Request</h3>

<input id="name" placeholder="What is your real name?">
<input id="gameName" placeholder="What is the game name?">
<input id="email" placeholder="What is your email?">
<input id="x" placeholder="What is your X Username?">

<select id="type">
<option>Horror</option>
<option>Simulator</option>
<option>PvP / FPS</option>
<option>Story Game</option>
<option>Open World</option>
<option>Other</option>
</select>

<textarea id="details" placeholder="What are the details/story of this game?"></textarea>

<button onclick="submitGame()">Submit Game Request</button>
</div>

</div>

<!-- ADMIN -->
<div class="right">

<h3>Admin Panel</h3>

<input id="pass" type="password" placeholder="Admin Password">
<button onclick="login()">Login</button>

<div id="list"></div>

</div>

</div>

<script>

/* STORAGE */
let games = JSON.parse(localStorage.getItem("voided_games_final") || "[]");

const PASSWORD = "VoidedStudios.Agent";
let loggedIn = false;

const listDiv = document.getElementById("list");

/* SAVE SYSTEM */
function save(){
localStorage.setItem("voided_games_final", JSON.stringify(games));
render();
}

/* =========================
   SUBMIT GAME REQUEST
========================= */
function submitGame(){

const name = document.getElementById("name").value.trim();
const gameName = document.getElementById("gameName").value.trim();
const email = document.getElementById("email").value.trim();
const x = document.getElementById("x").value.trim();
const type = document.getElementById("type").value;
const details = document.getElementById("details").value.trim();

if(!name || !gameName || !email || !details){
alert("Please fill all required fields");
return;
}

const game = {
name,
gameName,
email,
x,
type,
details,
time: new Date().toLocaleString(),
status: "Pending"
};

games.unshift(game);
save();

alert("Game Request submitted! You will receive an email on the application status.");
}

/* LOGIN */
function login(){
const pass = document.getElementById("pass").value;

if(pass === PASSWORD){
loggedIn = true;
render();
}else{
alert("Incorrect password");
}
}

/* =========================
   EMAIL SYSTEM (OPTION 2 FIXED)
========================= */
function sendEmail(item, status){

const subject = `Voided Studios Game Request - ${status}`;

const body =
`Hello ${item.name},

After review, we have decided to accept your request.

Game Name: ${item.gameName}
Game Type: ${item.type}

Details:
${item.details}

Thank you for putting your game request in with us!
- Voided Studios Game Request team`;

window.location.href =
`mailto:${item.email}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
}

/* STATUS HANDLER */
function setStatus(i, status){
games[i].status = status;
save();
sendEmail(games[i], status);
}

/* ADMIN RENDER */
function render(){

if(!loggedIn){
listDiv.innerHTML = "<p style='color:#888'>Admin locked.</p>";
return;
}

if(games.length === 0){
listDiv.innerHTML = "<p style='color:#888'>No game requests yet.</p>";
return;
}

listDiv.innerHTML = games.map((g,i)=>`
<div class="app">
<b>${g.name}</b><br>
Game: ${g.gameName}<br>
Email: ${g.email}<br>
X: ${g.x}<br>
Type: ${g.type}<br>
<div class="small">${g.time}</div>
<b>Status:</b> ${g.status}<br>

<button onclick="setStatus(${i},'accepted')">Accept</button>
<button onclick="setStatus(${i},'declined')">Decline</button>
</div>
`).join("");
}

render();

</script>

</body>
</html>
